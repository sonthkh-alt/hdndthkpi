name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Cài đặt phụ thuộc
        run: npm install --no-audit --no-fund
      - name: Kiểm tra mã (ESLint)
        run: npm run lint
      - name: Build
        run: npm run build
